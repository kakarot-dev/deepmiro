{{- if and .Values.ingress.enabled (not .Values.hosted.enabled) }}
# Self-hosted mode: expose MCP, backend, and health directly.
# When hosted.enabled=true, the deepmiro-hosted overlay owns the ingress
# and routes ALL paths (/api, /mcp, /health, /dashboard) through the
# hosted pod for auth, rate limiting, and user scoping.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "mirofish.fullname" . }}
  labels:
    {{- include "mirofish.labels" . | nindent 4 }}
  annotations:
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
  - host: {{ .Values.ingress.host }}
    http:
      paths:
      - path: /mcp
        pathType: Prefix
        backend:
          service:
            name: {{ include "mirofish.fullname" . }}-mcp
            port:
              number: {{ .Values.mcp.port }}
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: {{ include "mirofish.fullname" . }}-backend
            port:
              number: {{ .Values.backend.port }}
      - path: /health
        pathType: Exact
        backend:
          service:
            name: {{ include "mirofish.fullname" . }}-mcp
            port:
              number: {{ .Values.mcp.port }}
{{- end }}
