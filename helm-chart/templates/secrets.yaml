apiVersion: v1
kind: Secret
metadata:
  name: {{ include "mirofish.fullname" . }}-secrets
  labels:
    {{- include "mirofish.labels" . | nindent 4 }}
type: Opaque
stringData:
  # llmApiKey uses the `required` helper so `helm install` hard-fails
  # if it's missing — the engine can't do anything without an LLM
  # provider.
  llm-api-key: {{ required "secrets.llmApiKey is required — set your LLM provider API key in values.yaml or via --set secrets.llmApiKey=..." .Values.secrets.llmApiKey | quote }}
  # surrealPassword is also required. A "changeme" default used to
  # live here, which would silently ship a root-privileged DB if a
  # user installed the chart without overriding it. Generate one via:
  #   openssl rand -hex 32
  surreal-password: {{ required "secrets.surrealPassword is required — generate one with: openssl rand -hex 32" .Values.secrets.surrealPassword | quote }}
  # mcpApiKey is optional — empty means no auth on the MCP HTTP
  # transport (fine for cluster-internal deployments, dangerous if
  # the MCP ingress is exposed to the internet).
  mcp-api-key: {{ .Values.secrets.mcpApiKey | default "" | quote }}
